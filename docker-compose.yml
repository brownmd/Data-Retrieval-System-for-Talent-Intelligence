services:
  ai-literacy-db:
    image: postgis/postgis:15-3.4-alpine
    container_name: ai-literacy-db
    environment:
      POSTGRES_PASSWORD: ailiteracy
      POSTGRES_USER: ailiteracy
      POSTGRES_DB: ai_literacy
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - ./ai-literacy-pgdata:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ailiteracy -d ai_literacy"]
      interval: 10s
      timeout: 5s
      retries: 5

  metabase:
    image: metabase/metabase:latest
    container_name: ai-literacy-metabase
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - ./metabase-data:/metabase-data
    environment:
      MB_DB_FILE: /metabase-data/metabase.db
    depends_on:
      ai-literacy-db:
        condition: service_healthy
    restart: unless-stopped
